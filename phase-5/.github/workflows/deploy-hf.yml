name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main, master]
    paths:
      - "phase-5/backend/**"
  workflow_dispatch:

jobs:
  deploy-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "deploy@flowtask.ai"
          git config --global user.name "FlowTask Deploy"

          # Clone HF Space
          git clone https://Krish222:${HF_TOKEN}@huggingface.co/spaces/Krish222/phase5 hf-space

          # Clear old files (keep .git)
          cd hf-space
          find . -not -path './.git*' -not -name '.' -delete 2>/dev/null || true

          # Copy backend files
          cp -r $GITHUB_WORKSPACE/phase-5/backend/. .

          # Update README for HF Space
          cat > README.md << 'EOF'
          ---
          title: FlowTask Backend
          emoji: ⚡
          colorFrom: indigo
          colorTo: purple
          sdk: docker
          app_port: 8000
          pinned: false
          ---

          # FlowTask AI Backend
          FastAPI backend for FlowTask AI task manager.
          EOF

          # Commit and push
          git add -A
          git diff --cached --quiet || git commit -m "Deploy FlowTask backend $(date '+%Y-%m-%d %H:%M')"
          git push https://Krish222:${HF_TOKEN}@huggingface.co/spaces/Krish222/phase5 main
