services:
  - type: web
    name: flowtask-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: GROK_API_KEY
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: EXTRA_ORIGINS
        sync: false
      - key: LOG_LEVEL
        value: INFO
      - key: DAPR_HTTP_PORT
        value: "3500"
