replicaCount: 2

image:
  repository: todo-frontend
  tag: "v1.0.0"
  # CRITICAL: Never — images built directly into Minikube daemon (Constitution Law XXI)
  pullPolicy: Never

nameOverride: ""
fullnameOverride: ""

service:
  type: NodePort
  port: 3000
  nodePort: 30000

env:
  # K8s internal DNS — baked at build time but also set at runtime for reference
  NEXT_PUBLIC_API_URL: "http://todo-backend-todo-backend:8000"
  NODE_ENV: "production"
  NEXT_TELEMETRY_DISABLED: "1"

# Resource limits — Minikube conservative (Constitution Law XXVI)
resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
