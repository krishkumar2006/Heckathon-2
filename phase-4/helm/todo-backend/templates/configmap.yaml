apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "todo-backend.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "todo-backend.labels" . | nindent 4 }}
data:
  FRONTEND_URL: {{ .Values.config.FRONTEND_URL | quote }}
  ENVIRONMENT: {{ .Values.config.ENVIRONMENT | quote }}
