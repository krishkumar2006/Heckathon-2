name: Deploy Backend to Hugging Face

on:
  push:
    branches: [main, master]
    paths:
      - "phase-5/backend/**"
  workflow_dispatch:

jobs:
  deploy-to-hf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Push backend to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python3 -c "
import os
from huggingface_hub import HfApi

token = os.environ['HF_TOKEN']
api = HfApi(token=token)

readme = '''---\ntitle: FlowTask Backend\nemoji: lightning\ncolorFrom: indigo\ncolorTo: purple\nsdk: docker\napp_port: 8000\npinned: false\n---\n\n# FlowTask AI Backend\nFastAPI backend.\n'''

with open('phase-5/backend/README.md', 'w') as f:
    f.write(readme)

api.upload_folder(
    folder_path='phase-5/backend',
    repo_id='Krish222/phase5',
    repo_type='space',
    commit_message='Deploy FlowTask backend',
    ignore_patterns=['__pycache__', '*.pyc', '.env', '*.db'],
)
print('Deployed successfully!')
"
